[install]
method = "dev"
version = "0.1.15"

[adapters.codex]
enabled = true
binary = "codex"
wrapper = "codex-orb"

[adapters.claude]
enabled = false
binary = "claude"
wrapper = "claude-orb"

[daemon]
host = "127.0.0.1"
port = 17321
auto_start = true

[orb]
position = "top-right"
size = 48
opacity = 0.92
always_on_top = true
click_through = false

[colors]
disconnected = "#6B7280"
idle = "#9CA3AF"
starting = "#60A5FA"
active = "#3B82F6"
thinking_like = "#FACC15"
waiting_input = "#EF4444"
compacting = "#A855F7"
completed = "#22C55E"
error = "#EF4444"
warning = "#F97316"

[behavior]
silent_threshold_seconds = 20
stuck_threshold_seconds = 180
completed_hold_seconds = 10
error_requires_click_to_clear = true

[privacy]
include_output_sample = false
max_sample_chars = 512
